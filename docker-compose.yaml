services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper_antifraude
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_antifraude
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: mysql_antifraude
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  transacao:
    image: transacaopython
    container_name: transacao_antifraude
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:@mysql:3306/transacaodb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DD_SERVICE: transacao
      DD_ENV: dev

  antifraude:
    image: antifraudepython
    container_name: antifraude_service
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:@mysql:3306/antifraudedb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DD_SERVICE: antifraude
      DD_ENV: dev

  pagamento:
    image: pagamentopython
    container_name: pagamento_service
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:@mysql:3306/pagamentodb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DD_SERVICE: pagamento
      DD_ENV: dev

  datadog:
    image: gcr.io/datadoghq/agent:latest
    container_name: datadog-agent
    depends_on:
      - kafka
      - mysql
    environment:
      DD_API_KEY: "Chave_APIKEY"
      DD_SITE: "datadoghq.com"
      DD_ENV: "dev"
      DD_LOGS_ENABLED: "true"
      DD_APM_ENABLED: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_LOG_LEVEL: "INFO"
      DD_DOCKER_LABELS_AS_TAGS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro